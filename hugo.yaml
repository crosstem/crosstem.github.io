baseURL: "https://crosstem.github.io/"
title: CROSSTEM
copyright: "Copyright 2025 [CROSSTEM Inc.](https://crosstem.github.io/)"
# NOTE: https://discourse.gohugo.io/t/pagination-deprecated-error/51571/3
pagination:
  disableAliases: false
  pagerSize: 10
  path: page
theme: PaperMod
defaultContentLanguage: en

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

minify:
  disableXML: true
  # minifyOutput: true

languages:
  en:
    languageName: ":us:"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Company
          url: company
          weight: 5
        - name: Services
          url: services
          weight: 10
        - name: Search
          url: search/
          weight: 15
        - name: Tags
          url: tags/
          weight: 20
        # - name: Archives
        #   url: archives
        #   weight: 1000
  jp:
    languageName: ":jp:"
    weight: 2
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: 会社情報
          url: company
          weight: 5
        - name: サービス紹介
          url: services
          weight: 10
        - name: 検索
          url: search/
          weight: 15
        - name: タグ
          url: tags/
          weight: 20
        # - name: Archives
        #   url: archives
        #   weight: 1000

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "CROSSTEM Inc. - https://github.com/crosstem/crosstem.github.io"
  author: "CROSSTEM Inc."
  # author: ["Me", "You"] # multiple authors

  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  # comments: false
  images: ["images/papermod-cover.png"]

  profileMode:
    enabled: true
    title: CROSSTEM Inc.
    subtitle: "A technology company that provides services in the fields of STEM"
    imageUrl: "https://avatars.githubusercontent.com/u/198657521"
    imageTitle: Company Logo
    imageWidth: 200
    imageHeight: 200
    buttons:
      - name: Company
        url: company
      - name: Services
        url: services

  socialIcons:
    - name: github
      title: View Source on Github
      url: "https://github.com/crosstem"
    - name: linkedin
      title: View Profile on LinkedIn
      url: "https://www.linkedin.com/company/crosstem"

  editPost:
    URL: "https://github.com/crosstem/crosstem.github.io/tree/main/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # label:
  # iconSVG: '<svg xmlns="http://www.w3.org/2000/svg" height="25" viewBox="0 -960 960 960" fill="currentColor"><path d="M320-240h320v-80H320v80Zm0-160h320v-80H320v80ZM240-80q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880h320l240 240v480q0 33-23.5 56.5T720-80H240Zm280-520v-200H240v640h480v-440H520ZM240-800v200-200 640-640Z"/></svg>'
  # text: "Home"
  # icon: icon.png
  # iconHeight: 35

  # analytics:
  #     google:
  #         SiteVerificationTag: "XYZabc"

  assets:
    disableHLJS: true
  #     favicon: "<link / abs url>"
  #     favicon16x16: "<link / abs url>"
  #     favicon32x32: "<link / abs url>"
  #     apple_touch_icon: "<link / abs url>"
  #     safari_pinned_tab: "<link / abs url>"

  # cover:
  #     hidden: true # hide everywhere but not in structured data
  #     hiddenInList: true # hide on list pages and home
  #     hiddenInSingle: true # hide on single page

  # fuseOpts:
  #     isCaseSensitive: false
  #     shouldSort: true
  #     location: 0
  #     distance: 1000
  #     threshold: 0.4
  #     minMatchCharLength: 0
  #     keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai

